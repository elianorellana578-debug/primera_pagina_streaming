
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WillFlix - Tu Plataforma de Streaming</title>
    <style>
        :root {
            --primary: #e50914;
            --background: #141414;
            --surface: #2f2f2f;
            --text: #ffffff;
            --gray: #b3b3b3;
        }

        body {
            background-color: var(--background);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }

        h1 { color: var(--primary); margin-bottom: 5px; }
        h2 { border-bottom: 2px solid var(--surface); padding-bottom: 10px; margin-top: 40px; }

        /* Sección de Autenticación */
        .auth-container {
            background: var(--surface);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .auth-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
            margin-bottom: 15px;
        }

        .auth-row:last-child { margin-bottom: 0; }

        input {
            padding: 10px;
            border-radius: 4px;
            border: none;
            background: #444;
            color: white;
            flex: 1;
            min-width: 150px;
        }

        button {
            padding: 10px 20px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover { opacity: 0.8; }

        /* Buscador */
        .search-container {
            margin: 20px 0;
            display: flex;
            gap: 10px;
        }

        /* Catálogo */
        .catalog {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .movie-card {
            background: var(--surface);
            border-radius: 10px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }

        .movie-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
        }

        /* Reproductor */
        #player-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98);
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        video { width: 90%; max-width: 1000px; }

        .close-btn {
            position: absolute;
            top: 30px; right: 50px;
            color: white; font-size: 40px; cursor: pointer;
        }

        #status-msg { font-size: 0.8em; color: var(--primary); margin-bottom: 10px; }
    </style>
</head>
<body>

    <header>
        <h1>WillFlix</h1>
        <div id="status-msg">Estado: No identificado</div>
    </header>

    <section class="auth-container">
        <div class="auth-row">
            <strong>Registro:</strong>
            <input type="text" id="reg-user" placeholder="Nuevo Usuario">
            <input type="email" id="reg-email" placeholder="Correo Electrónico">
            <input type="password" id="reg-pass" placeholder="Contraseña">
            <button onclick="handleSignUp()" style="background: #28a745;">Crear Cuenta</button>
        </div>
        <hr style="border: 0; border-top: 1px solid #444; margin: 15px 0;">
        <div class="auth-row">
            <strong>Ingreso:</strong>
            <input type="text" id="login-user" placeholder="Usuario">
            <input type="password" id="login-pass" placeholder="Contraseña">
            <button onclick="handleLogin()">Entrar</button>
            <button onclick="handleLogout()" style="background:#555">Salir</button>
        </div>
    </section>

    <section class="search-container">
        <input type="text" id="search-input" placeholder="¿Qué quieres ver hoy?" style="flex-grow: 1;">
        <button onclick="searchMovie()">Buscar</button>
        <button onclick="loadMovies()" style="background:#555">Ver Todo</button>
    </section>

    <h2>Catálogo</h2>
    <div class="catalog" id="movie-catalog"></div>

    <div id="player-modal">
        <span class="close-btn" onclick="closePlayer()">&times;</span>
        <h2 id="current-movie-title" style="margin-bottom: 20px;"></h2>
        <video id="video-player" controls></video>
    </div>

    <script>
        const API_BASE = "https://primera-pagina-streaming-1.onrender.com";

        // --- REGISTRO (CONECTA CON /sign_up) ---
        async function handleSignUp() {
            const username = document.getElementById('reg-user').value;
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-pass').value;

            if (!username || !email || !password) return alert("Llena todos los campos");

            try {
                const response = await fetch(`${API_BASE}/sign_up`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || "Error al registrar");
                }

                alert("¡Cuenta creada! Ya puedes iniciar sesión.");
                // Limpiar campos
                document.getElementById('reg-user').value = "";
                document.getElementById('reg-email').value = "";
                document.getElementById('reg-pass').value = "";
            } catch (err) {
                alert(err.message);
            }
        }

        // --- LOGIN (CONECTA CON /log_in) ---
        async function handleLogin() {
            const user = document.getElementById('login-user').value;
            const pass = document.getElementById('login-pass').value;

            const formData = new FormData();
            formData.append('username', user);
            formData.append('password', pass);

            try {
                const response = await fetch(`${API_BASE}/log_in`, {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) throw new Error("Usuario o contraseña incorrectos");

                const data = await response.json();
                localStorage.setItem('access_token', data.access_token);
                document.getElementById('status-msg').innerText = `Estado: Conectado como ${user}`;
                alert("Bienvenido de nuevo");
                loadMovies();
            } catch (err) {
                alert(err.message);
            }
        }

        function handleLogout() {
            localStorage.removeItem('access_token');
            location.reload();
        }

        async function loadMovies() {
            try {
                const response = await fetch(`${API_BASE}/movies`);
                const movies = await response.json();
                renderCatalog(movies);
            } catch (err) { console.error(err); }
        }

        async function searchMovie() {
            const title = document.getElementById('search-input').value;
            if (!title) return;
            try {
                const response = await fetch(`${API_BASE}/movies/search/${title}`);
                if (!response.ok) throw new Error();
                const movie = await response.json();
                renderCatalog([movie]);
            } catch (err) { alert("No se encontró la película"); }
        }

        function renderCatalog(movies) {
            const container = document.getElementById('movie-catalog');
            container.innerHTML = '';
            movies.forEach(movie => {
                const div = document.createElement('div');
                div.className = 'movie-card';
                div.innerHTML = `<h3>${movie.title}</h3><p>${movie.genres}</p><p><small>${movie.description}</small></p>`;
                div.onclick = () => openPlayer(movie.video_url, movie.title, movie.id);
                container.appendChild(div);
            });
        }

        function openPlayer(videoName, title, movieId) {
            const modal = document.getElementById('player-modal');
            const video = document.getElementById('video-player');
            document.getElementById('current-movie-title').innerText = title;
            video.src = `${API_BASE}/video/${videoName}`;
            modal.style.display = 'flex';
            video.play();
            saveToHistory(movieId);
        }

        async function saveToHistory(movieId) {
            const token = localStorage.getItem('access_token');
            if (!token) return;
            fetch(`${API_BASE}/history/${movieId}`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` }
            });
        }

        function closePlayer() {
            const video = document.getElementById('video-player');
            video.pause();
            video.src = "";
            document.getElementById('player-modal').style.display = 'none';
        }

        window.onload = loadMovies;
    </script>
</body>
</html>
