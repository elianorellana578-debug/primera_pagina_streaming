
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WillFlix - Tu Plataforma de Streaming</title>
    <style>
        :root {
            --primary: #e50914;
            --background: #141414;
            --surface: #2f2f2f;
            --text: #ffffff;
            --gray: #b3b3b3;
        }

        body {
            background-color: var(--background);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }

        h1 { color: var(--primary); margin-bottom: 5px; }
        h2 { border-bottom: 2px solid var(--surface); padding-bottom: 10px; margin-top: 40px; }

        /* Sección de Autenticación */
        .auth-bar {
            background: var(--surface);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        input {
            padding: 10px;
            border-radius: 4px;
            border: none;
            background: #444;
            color: white;
        }

        button {
            padding: 10px 20px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover { opacity: 0.8; }

        /* Buscador */
        .search-container {
            margin: 20px 0;
            display: flex;
            gap: 10px;
        }

        /* Catálogo de Películas */
        .catalog {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .movie-card {
            background: var(--surface);
            border-radius: 10px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }

        .movie-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            background: #3d3d3d;
        }

        .movie-card h3 { margin: 0 0 10px 0; color: var(--primary); }
        .movie-card p { font-size: 0.9em; color: var(--gray); line-height: 1.4; }

        /* Reproductor */
        #player-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98);
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        video { width: 90%; max-width: 1000px; box-shadow: 0 0 50px rgba(229, 9, 20, 0.2); }

        .close-btn {
            position: absolute;
            top: 30px; right: 50px;
            color: white; font-size: 40px; cursor: pointer;
        }

        #status-msg { font-size: 0.8em; color: var(--primary); }
    </style>
</head>
<body>

    <header>
        <h1>WillFlix</h1>
        <div id="status-msg">Estado: No identificado (Inicia sesión para guardar historial)</div>
    </header>

    <section class="auth-bar">
        <input type="text" id="login-user" placeholder="Usuario">
        <input type="password" id="login-pass" placeholder="Contraseña">
        <button onclick="handleLogin()">Iniciar Sesión</button>
        <button onclick="handleLogout()" style="background:#555">Salir</button>
    </section>

    <section class="search-container">
        <input type="text" id="search-input" placeholder="¿Qué quieres ver hoy?" style="flex-grow: 1;">
        <button onclick="searchMovie()">Buscar Título</button>
        <button onclick="loadMovies()" style="background:#555">Ver Todo</button>
    </section>

    <h2>Catálogo Disponible</h2>
    <div class="catalog" id="movie-catalog">
        </div>

    <div id="player-modal">
        <span class="close-btn" onclick="closePlayer()">&times;</span>
        <h2 id="current-movie-title" style="margin-bottom: 20px;"></h2>
        <video id="video-player" controls></video>
    </div>

    <script>
        const API_BASE = "https://primera-pagina-streaming-1.onrender.com";

        // --- LÓGICA DE AUTENTICACIÓN ---
        async function handleLogin() {
            const user = document.getElementById('login-user').value;
            const pass = document.getElementById('login-pass').value;

            const formData = new FormData();
            formData.append('username', user);
            formData.append('password', pass);

            try {
                const response = await fetch(`${API_BASE}/log_in`, {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) throw new Error("Credenciales inválidas");

                const data = await response.json();
                localStorage.setItem('access_token', data.access_token);
                document.getElementById('status-msg').innerText = `Estado: Conectado como ${user}`;
                alert("Sesión iniciada correctamente");
                loadMovies();
            } catch (err) {
                alert(err.message);
            }
        }

        function handleLogout() {
            localStorage.removeItem('access_token');
            location.reload();
        }

        // --- LÓGICA DE CATÁLOGO Y BÚSQUEDA ---
        async function loadMovies() {
            try {
                const response = await fetch(`${API_BASE}/movies`);
                const movies = await response.json();
                renderCatalog(movies);
            } catch (err) {
                console.error("Error al cargar películas", err);
            }
        }

        async function searchMovie() {
            const title = document.getElementById('search-input').value;
            if (!title) return;

            try {
                const response = await fetch(`${API_BASE}/movies/search/${title}`);
                if (!response.ok) throw new Error("No encontrada");
                const movie = await response.json();
                renderCatalog([movie]); // Mostramos solo la encontrada
            } catch (err) {
                alert("No se encontró ninguna película con ese nombre.");
            }
        }

        function renderCatalog(movies) {
            const container = document.getElementById('movie-catalog');
            container.innerHTML = '';
            
            movies.forEach(movie => {
                const div = document.createElement('div');
                div.className = 'movie-card';
                div.innerHTML = `
                    <h3>${movie.title}</h3>
                    <p><strong>Género:</strong> ${movie.genres}</p>
                    <p>${movie.description}</p>
                    <p><small>Año: ${movie.year}</small></p>
                `;
                // Usamos movie.id para el historial y movie.video_url para el stream
                div.onclick = () => openPlayer(movie.video_url, movie.title, movie.id);
                container.appendChild(div);
            });
        }

        // --- LÓGICA DE STREAMING e HISTORIAL ---
        function openPlayer(videoName, title, movieId) {
            const modal = document.getElementById('player-modal');
            const video = document.getElementById('video-player');
            const titleTag = document.getElementById('current-movie-title');

            titleTag.innerText = title;
            video.src = `${API_BASE}/video/${videoName}`;
            
            modal.style.display = 'flex';
            video.play();

            // Llamada automática al historial al abrir
            saveToHistory(movieId);
        }

        async function saveToHistory(movieId) {
            const token = localStorage.getItem('access_token');
            if (!token) return; // Si no hay login, no guarda historial

            try {
                await fetch(`${API_BASE}/history/${movieId}`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                console.log("Historial actualizado satisfactoriamente.");
            } catch (err) {
                console.error("Error al actualizar historial", err);
            }
        }

        function closePlayer() {
            const modal = document.getElementById('player-modal');
            const video = document.getElementById('video-player');
            video.pause();
            video.src = "";
            modal.style.display = 'none';
        }

        // Al cargar la página, mostramos el catálogo inicial
        window.onload = loadMovies;
    </script>
</body>
</html>
